services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: nutrition
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build:
      context: ./backend
    depends_on:
      - postgres
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/nutrition
    ports:
      - "8000:8000"

  frontend:
      build:
        context: ./frontend
      ports:
        - "5173:5173"
      depends_on:
        - api
      environment:
        - CHOKIDAR_USEPOLLING=true

volumes:
  postgres_data: